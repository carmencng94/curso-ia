version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb_curso
    ports:
      - "8000:8000"
    volumes:
      - ./db_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  # ←←← NUEVO: Ollama (IA local)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_curso
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # Opcional: si tienes GPU, descomenta la línea de abajo
    # deploy:
