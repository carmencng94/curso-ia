version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: mi_base_vectorial
    ports:
      - "8000:8000"
    volumes:
      - ./db_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_HTTP_PORT=8000

  monitor:
    image: nginx:alpine
    container_name: panel_monitoreo
    ports:
      - "8080:80"