<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resosense IA - Mi Asistente Personal</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
    h1 { color: #2c3e50; }
    input, textarea, button { padding: 10px; margin: 10px 0; width: 100%; max-width: 600px; }
    button { background: #3498db; color: white; border: none; cursor: pointer; }
    button:hover { background: #2980b9; }
    #respuesta { background: white; padding: 15px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>🤖 Resosense IA - Pregunta sobre el libro</h1>

  <h3>Procesar un PDF:</h3>
  <input id="booksApiKey" type="password" placeholder="Clave opcional para libros (BOOKS_API_KEY)" />
  <input id="idLibro" type="text" placeholder="ID base (ej: libro_001)" />
  <input id="tituloLibro" type="text" placeholder="Título del libro" />
  <input id="rutaPDF" type="text" placeholder="Ruta local del PDF (ej: C:\\ruta\\archivo.pdf)" />
  <button onclick="procesarLibro()">Procesar libro</button>
  <div id="estadoProcesado" style="background:white; padding:15px; border-radius:8px; margin-top:10px;"></div>

  <h3>Eliminar un libro duplicado:</h3>
  <input id="idEliminar" type="text" placeholder="ID base a eliminar (ej: libro_001)" />
  <button onclick="eliminarLibro()" style="background:#d9534f;">Eliminar libro</button>
  <div id="estadoEliminado" style="background:white; padding:15px; border-radius:8px; margin-top:10px;"></div>

  <h3>Haz una pregunta sobre el libro:</h3>
  <textarea id="pregunta" rows="3" placeholder="Ej: ¿De qué trata el libro Resosense?"></textarea><br>

  <button onclick="hacerPregunta()">Enviar Pregunta</button>

  <div id="respuesta"></div>

  <script>
    async function eliminarLibro() {
      const apiKey = document.getElementById("booksApiKey").value;
      const id = document.getElementById("idEliminar").value;
      const divEstado = document.getElementById("estadoEliminado");

      if (!id) {
        alert("Escribe el id base del libro");
        return;
      }

      divEstado.innerHTML = "Eliminando libro...";

      try {
        const headers = { "Content-Type": "application/json" };

        if (apiKey) {
          headers["x-api-key"] = apiKey;
        }

        const response = await fetch("/eliminar-libro", {
          method: "POST",
          headers,
          body: JSON.stringify({ id })
        });

        const data = await response.json();

        if (!response.ok) {
          divEstado.innerHTML = `Error: ${data.error || "No se pudo eliminar el libro"}`;
          return;
        }

        divEstado.innerHTML = `
          <strong>Estado:</strong> ${data.mensaje}<br>
          <strong>ID base:</strong> ${data.idBase}<br>
          <strong>Chunks eliminados:</strong> ${data.eliminado}
        `;
      } catch (error) {
        divEstado.innerHTML = "Error: No se pudo conectar con el servidor.";
        console.error(error);
      }
    }

    async function procesarLibro() {
      const apiKey = document.getElementById("booksApiKey").value;
      const id = document.getElementById("idLibro").value;
      const titulo = document.getElementById("tituloLibro").value;
      const rutaPDF = document.getElementById("rutaPDF").value;
      const divEstado = document.getElementById("estadoProcesado");

      if (!id || !titulo || !rutaPDF) {
        alert("Completa id, título y rutaPDF");
        return;
      }

      divEstado.innerHTML = "Procesando PDF...";

      try {
        const headers = { "Content-Type": "application/json" };

        if (apiKey) {
          headers["x-api-key"] = apiKey;
        }

        const response = await fetch("/procesar-libro", {
          method: "POST",
          headers,
          body: JSON.stringify({ id, titulo, rutaPDF })
        });

        const data = await response.json();

        if (!response.ok) {
          divEstado.innerHTML = `Error: ${data.error || "No se pudo procesar el libro"}`;
          return;
        }

        divEstado.innerHTML = `
          <strong>Estado:</strong> ${data.mensaje}<br>
          <strong>Título:</strong> ${data.titulo}<br>
          <strong>Chunks guardados:</strong> ${data.chunksGuardados}<br>
          <strong>ID base:</strong> ${data.idBase}
        `;
      } catch (error) {
        divEstado.innerHTML = "Error: No se pudo conectar con el servidor.";
        console.error(error);
      }
    }

    async function hacerPregunta() {
      const pregunta = document.getElementById("pregunta").value;
      const divRespuesta = document.getElementById("respuesta");

      if (!pregunta) {
        alert("Escribe una pregunta");
        return;
      }

      divRespuesta.innerHTML = "Pensando...";

      try {
        const response = await fetch("/consultar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pregunta: pregunta })
        });

        const data = await response.json();

        divRespuesta.innerHTML = `
          <strong>Pregunta:</strong> ${data.pregunta}<br><br>
          <strong>Respuesta:</strong><br>
          ${data.respuesta || "No se encontró información"}
          <br><br>
          <strong>Documentos usados:</strong> ${data.documentosUsados ?? "N/D"}
        `;
      } catch (error) {
        divRespuesta.innerHTML = "Error: No se pudo conectar con el servidor.";
        console.error(error);
      }
    }
  </script>
</body>
</html>
